<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        hr{
           width: 200px;
           float: right;
        }
        .ct{
            position: relative;

    <section>

        <div style="position: relative;">
            <hr style="width: 600px; float: none;">
            <h1 style="position: absolute; font-size: 60px; color: black;font-weight: bold; background-color: white; bottom: -30px; left: 173px; right: 169px;">Trip to paris</h1>
        </div>

        <br><br><br>
        <div style="display: inline-block; width: 400px; text-align: right;" >
            <span class="fa fa-arrow-circle-left" style="color:#E74C3C; font-size: 50px;"></span>

        </div>
        <br><br>
       <div class="flex-container"> 
            <div class="flex-item" style="width:300px; height: 350px ; text-align:center">

                <hr><br><br>
                <span class="font2 ct">Completed task</span>
                <br><br>
            
                <div class="font2" style="font-size: larger;">

                </div>  
            </div>
